<div id="finished-sheet-box" class="container-background container-background-transparent hide">
    <div class="dialog" style="height: 500px;">
        <div class="title-bar">
            <div id="close-finished-sheet-box" style="float: right; margin-right: 10px; margin-top: 5px;">
                <img src="{{ url_for('static', filename='images/close.svg') }}" style="height: 20px; width: 20px; cursor: pointer;"/>
            </div>
        </div>
        <div class="container-contents" tabindex="-1" data-tabbable="false">
            <h1>Sheet complete!</h1>
            <p>You've made all the progress on this sheet that you can. Do you want to stop?</p>
            <p>
                <button id="stop-test" class="button">Stop</button>
                <button id="continue-test" class="button">Continue</button>
            </p>
        </div>
    </div>
</div>
