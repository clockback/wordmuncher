<html onclick="closeAllSelect();">
    <head>
        <title>Prokart</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/general.css') }}">
        <script type="text/javascript" src="{{ url_for('static', filename='js/languages/languages.js') }}"></script>
        <script type="text/javascript" src="{{ url_for('static', filename='js/select_translator.js') }}"></script>
    </head>

    <body>
        {% include 'components/topbar.html' %}
        <div id="main">
            <div style="margin-left: 5px; margin-top: 5px;">
                <div id="add-language" style="background: rgb(230, 230, 230); display: inline-block; padding: 10px; margin-right: 5px;">
                    <h2>Add language:</h2>
                    <div class="input-box">
                        <input id="language-name" placeholder="Language name" oninput="changeLanguageName();" autocomplete="off"/>
                    </div>
                    <div style="display: inline-block; position: relative;">
                        <button id="choose-flag" class="flag-drop" onclick="expandFlags(this);">🇬🇧</button>
                    </div>
                    <div>
                        <button id="add-button" class="button button-disabled">Add</button>
                    </div>
                    <div id="hidden-flags" style="margin-top: 5px; border-top: 1px solid grey; width: 100%; padding-top: 5px; display: none;"></div>
                </div>
                <p>Translate from:</p>
                <div style="display: inline-block; width: 300px;">
                    <div id="translate_from" class="custom-select">
                        <select autocomplete="off">
                            <option value="0">Pick language:</option>
                            {% for i, (id, language, flag) in languages %}
                                <option value="{{ id }}">
                                    {{ flag }} {{ language }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <p>Translate to:</p>
                <div style="display: inline-block; width: 300px;">
                    <div id="translate_to" class="custom-select">
                        <select autocomplete="off">
                            <option value="0">Pick language:</option>
                            {% for i, (id, language, flag) in languages %}
                                <option value="{{ id }}">
                                    {{ flag }} {{ language }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div>
                    <button id="save-button" style="margin-top: 10px;" class="button button-disabled">Save</button>
                </div>
            </div>
        </div>
        <footer>
            <div style="margin-top: 10px; margin-bottom: 10px;">Copyright © 2020 – Elliot Paton-Simpson</div>
        </footer>
    </body>
</html>
