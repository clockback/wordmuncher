<html>
    <head>
        <title>Prokart</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/general.css') }}">
        <link rel="icon" href="{{ url_for('static', filename='images/logo.svg') }}">
        <link href="https://fonts.googleapis.com/css?family=M+PLUS+Rounded+1c" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet"> 
        <script type="text/javascript" src="{{ url_for('static', filename='js/select_translator.js') }}"></script>
        <script type="text/javascript" src="{{ url_for('static', filename='js/results/results.js') }}"></script>
        <script type="text/javascript" src="{{ url_for('static', filename='js/stars.js') }}"></script>
        <script type="text/javascript" src="{{ url_for('static', filename='js/utils.js') }}"></script>
    </head>

    <body style="margin: 0px; padding: 0px;">
        {% include 'components/topbar.html' %}
        <div id="main" tabindex="-1">
            <div style="margin-left: 5px;">
                <p>
                    Score:
                    <span id="final-score" style="font-weight: bold; font-size: 25px;"></span>
                </p>
                <table>
                    <tbody class="header-row">
                        <tr>
                            <th>
                                Question
                            </th>
                            <th>
                                # Correct
                            </th>
                            <th>
                                # Incorrect
                            </th>
                            <th>
                                Stars
                            </th>
                        </tr>
                    </tbody>
                    <tbody id="results-table">
                    </tbody>
                </table>
                <div style="margin-top: 10px;">
                    <div id="finish-button" class="button" onclick="window.location.href = '/test';">Finish</div>
                </div>
            </div>
        </div>
        <footer>
            <div>Copyright © 2021 – Elliot Paton-Simpson</div>
        </footer>
    </body>
</html>
