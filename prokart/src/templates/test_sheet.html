<!doctype html>
<html style="height: 100%;">
    <head>
        <title>Prokart</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/general.css') }}">
        <link rel="icon" href="{{ url_for('static', filename='images/logo.svg') }}">
        <link href="https://fonts.googleapis.com/css?family=M+PLUS+Rounded+1c" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
        <script type="module" src="{{ url_for('static', filename='js/test/test_sheet.js') }}"></script>
    </head>

    <body>
        <script>0</script>
        {% include 'components/testbar.html' %}
        <audio id="correct-sound">
          <source src="/static/audio/correct.mp3" type="audio/mpeg">
          Your browser does not support the audio element.
        </audio>
        <audio id="wrong-sound">
          <source src="/static/audio/wrong.mp3" type="audio/mpeg">
          Your browser does not support the audio element.
        </audio>
        <div id="main" class="main entire-test-area" tabindex="-1" data-tabbable="false">
            <div class="test-area">
                <div>
                    <h1 id="sheet-name">{{ sheet_name }}</h1>
                    <div id="stars-container" style="height: 23px;"></div>
                    <p id="question-text"></p>
                    <div class="answer-area">
                        <div class="textarea-container">
                            <textarea id="answer-box" autocomplete="off" placeholder="Type your answer"></textarea>
                        </div>
                        <div>
                            <table id="answer-table" class="schema-table" style="margin-left: auto; margin-right: auto;">
                                <tbody>
                                </tbody>
                            </table>
                        </div>
                        <div style="margin: auto; max-width: 600px;">
                            <button id="go-button" class="button button-disabled" style="float: right;">Check</button>
                            <div class="bar-chart-container">
                                <div class="bar-chart" style="width: 100%;"></div>
                                <div class="bar-chart-figure">100% complete</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="hide-screen" class="container-background container-background-opaque"></div>
        </div>
        <div id="try-again" class="alert" style="top: 20px; visibility: visible;">Check your spelling.</div>
        {% include 'components/wrong_answer.html' %}
        {% include 'components/finished_sheet.html' %}
    </body>
</html>
